<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thêm / Sửa tài khoản - Phúc Long</title>
    <!-- Bootstrap CSS -->
    <link href="public/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Custom CSS -->
    <link href="public/css/style.css" rel="stylesheet" />
    <link rel="stylesheet" href="public/css/admin.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav
      class="navbar navbar-expand-lg"
      style="background: rgba(255, 140, 0, 0.9)"
    >
      <div class="container-fluid">
        <a class="navbar-brand text-white fw-bold" href="admin.html"
          >Admin | 🍹 XLinh</a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link text-white" href="profile.html"
                >Xin chào, Quản trị viên</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="logout.html">Đăng xuất</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar position-sticky top-0">
          <a href="admin.html">📊 Tổng quan</a>
          <a href="admin-product.html">🛒 QL Sản phẩm</a>
          <a href="admin-topping.html">🍬 QL Topping</a>
          <a href="admin-order.html">📦 QL Đơn hàng</a>
          <a href="admin-user.html" class="active">👥 QL Tài khoản</a>
        </div>

        <!-- Nội dung chính -->
        <div class="col-md-10 p-4">
          <h2 class="mb-4">Thêm / Sửa tài khoản</h2>
          <form>
            <div class="mb-3">
              <label for="userName" class="form-label">Họ tên</label>
              <input
                type="text"
                id="userName"
                class="form-control"
                placeholder="Nhập họ tên"
                required
              />
            </div>
            <div class="mb-3">
              <label for="userEmail" class="form-label">Email</label>
              <input
                type="email"
                id="userEmail"
                class="form-control"
                placeholder="Nhập email"
                required
              />
            </div>
            <div class="mb-3">
              <label for="userPassword" class="form-label">Mật khẩu</label>
              <input
                type="password"
                id="userPassword"
                class="form-control"
                placeholder="Nhập mật khẩu"
                required
              />
            </div>
            <div class="mb-3">
              <label for="userPhone" class="form-label">Số điện thoại</label>
              <input
                type="tel"
                id="userPhone"
                class="form-control"
                placeholder="Nhập số điện thoại"
                required
              />
            </div>
            <div class="mb-3">
              <label for="userAddress" class="form-label">Địa chỉ</label>
              <textarea
                id="userAddress"
                class="form-control"
                rows="3"
                placeholder="Nhập địa chỉ"
              ></textarea>
            </div>
            <div class="mb-3">
              <label for="userRole" class="form-label">Vai trò</label>
              <select id="userRole" class="form-select">
                <option value="admin">Admin</option>
                <option value="user">User</option>
              </select>
            </div>
            <button type="submit" class="btn btn-warning">Lưu tài khoản</button>
            <a href="admin-user.html" class="btn btn-secondary">Hủy</a>
          </form>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="public/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="dist/admin.js"></script>
  </body>
</html>
